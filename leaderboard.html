<!doctype html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      rel="icon"
      href="https://kovu.dog/favicon.webp"
      sizes="any"
      type="image/webp"
    />
    <title>🌈 Leaderboard</title>
    <link rel="stylesheet" href="assets/styles/style.css" />
    <style>
      #leaderboard-wrapper {
        position: relative;
        z-index: 10;
        background-color: #1a1a1a;
        border: 4px solid #fff;
        padding: 20px;
        color: #fff;
        font-family: "Press Start 2P", monospace;
        max-width: 800px;
        width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        text-transform: uppercase;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);

        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: grayscale;
      }

      .lb-header,
      .lb-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 4px solid #333;
        font-size: 10px;
        line-height: 1.5;
      }

      .lb-header {
        font-weight: bold;
        border-bottom: 4px solid #fff;
        margin-bottom: 10px;
        color: #ffcc00;
      }

      .lb-rank {
        width: 15%;
        text-align: center;
      }
      .lb-name {
        width: 40%;
        text-align: left;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .lb-best {
        width: 20%;
        text-align: right;
      }
      .lb-total {
        width: 25%;
        text-align: right;
        padding-right: 10px;
      }

      .back-btn {
        position: relative;
        width: 90%;
        margin-bottom: 1rem;
        background-color: #f44336;
      }
      .back-btn:active {
        background-color: #c62828;
      }

      .sortable {
        cursor: pointer;
        transition: color 0.2s;
      }
      .sortable:hover {
        color: #fff;
      }
      .active-sort {
        color: #fff;
      }
      .active-sort::after {
        content: "▼";
        font-size: 8px;
        display: inline-block;
        vertical-align: middle;
        position: relative;
        top: -1px;
        margin-left: 4px;
      }

      @media (min-width: 600px) {
        .lb-header,
        .lb-row {
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body oncontextmenu="return false;">
    <div id="star-container" class="active"></div>

    <div id="leaderboard-wrapper">
      <div style="text-align: center">
        <button
          class="game-btn back-btn"
          onclick="window.location = 'index.html'"
        >
          &larr; Back to Nyan
        </button>
      </div>

      <h2
        style="
          text-align: center;
          margin: 1rem 0;
          font-size: 20px;
          line-height: 1.5;
        "
      >
        Top Nyaners
      </h2>

      <div class="lb-header">
        <div class="lb-rank">Rank</div>
        <div class="lb-name">Name</div>
        <div class="lb-best sortable" id="sort-best">Best</div>
        <div class="lb-total sortable active-sort" id="sort-total">Total</div>
      </div>

      <div id="leaderboard-content">
        <div
          style="
            text-align: center;
            padding: 40px;
            animation: pulse-text 1s infinite alternate;
          "
        >
          Loading Data...
        </div>
      </div>
    </div>

    <script src="assets/scripts/leaderboard.js"></script>
  </body>
</html>
