<!doctype html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      rel="icon"
      href="https://kovu.dog/favicon.webp"
      sizes="any"
      type="image/webp"
    />
    <title>🌈</title>
    <link rel="stylesheet" href="assets/styles/style.css" />
  </head>
  <body oncontextmenu="return false;">
    <div id="star-container"></div>

    <audio id="bg-music" loop preload="auto">
      <source src="assets/sounds/sound.flac" type="audio/flac" />
    </audio>

    <div id="meme-container">
      <div id="sticker-bob-wrapper">
        <div id="rainbow-trail"></div>
        <div id="click-me-container">
          <div id="click-me">Click me!</div>
        </div>
        <img id="sticker" src="assets/images/sticker.webp" draggable="false" />
      </div>
    </div>

    <div id="counter-container">
      You've nyaned for
      <div id="counter">0.0</div>
      seconds!
    </div>

    <button id="menu-btn" class="game-btn" onclick="toggleMenu()">
      &#9776;
    </button>

    <button id="version-btn" class="game-btn">26.1</button>

    <div id="side-menu">
      <button
        id="menu-close-btn"
        class="game-btn menu-item"
        onclick="toggleMenu()"
      >
        Close Menu
      </button>
      <button class="game-btn menu-item menu-label" disabled>
        Your Statistics
      </button>
      <button class="game-btn menu-item" disabled>
        Best: <span id="high-score-display">0.0</span> seconds
      </button>
      <button class="game-btn menu-item" disabled>
        Total: <span id="total-score-display">0.0</span> seconds
      </button>
      <button class="game-btn menu-item menu-label" disabled>Credits</button>
      <button
        class="game-btn menu-item"
        onclick="
          window.location = 'https://bsky.app/profile/yuriclown.bsky.social'
        "
      >
        Image by Spitzy
      </button>
      <button
        class="game-btn menu-item"
        onclick="
          window.location = 'https://www.youtube.com/watch?v=1Gw1nTsE7Gg'
        "
      >
        Audio by Surya Hearts
      </button>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <script src="assets/scripts/script.js"></script>
  </body>
</html>
