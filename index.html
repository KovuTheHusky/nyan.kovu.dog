<!doctype html>
<html lang="en" style="height: 100%">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <link
      rel="icon"
      href="https://kovu.dog/favicon.webp"
      sizes="any"
      type="image/webp"
    />
    <link
      rel="stylesheet"
      href="node_modules/@fortawesome/fontawesome-free/css/all.min.css"
    />
    <title>🌈</title>
    <link rel="stylesheet" href="assets/styles/style.css" />
  </head>
  <body oncontextmenu="return false;">
    <div id="star-container"></div>

    <audio id="bg-music" loop preload="auto">
      <source src="assets/sounds/sound.flac" type="audio/flac" />
    </audio>

    <div id="meme-container">
      <div id="sticker-bob-wrapper">
        <div id="rainbow-trail"></div>
        <img id="sticker" src="assets/images/sticker.webp" draggable="false" />
      </div>
    </div>

    <div id="start-container">Click or tap Kovu to start&hellip;</div>

    <div id="counter-container">
      You've nyaned for
      <div id="counter">0.0</div>
      seconds!
    </div>

    <button id="menu-btn" class="game-btn" onclick="toggleMenu()">
      <i class="fa-solid fa-bars"></i>
    </button>

    <button id="version-btn" class="game-btn">26.3</button>

    <div id="side-menu">
      <button
        id="menu-close-btn"
        class="game-btn menu-item"
        onclick="toggleMenu()"
      >
        Close Menu
      </button>
      <div class="game-btn menu-item volume-wrapper" id="volume-wrapper">
        <span class="volume-label">Volume</span>
        <input
          type="range"
          id="volume-slider"
          min="0"
          max="1"
          step="0.01"
          value="0.5"
        />
      </div>
      <button class="game-btn menu-item menu-label" disabled>
        Your Statistics
      </button>
      <input
        type="text"
        id="username-input"
        class="game-btn menu-item"
        placeholder="Username"
        maxlength="20"
      />
      <button class="game-btn menu-item" disabled>
        Best: <span id="user-high-score-display">0.0</span> &bull; Total:
        <span id="user-total-score-display">0.0</span>
      </button>
      <button class="game-btn menu-item" disabled>
        Wiggles: <span id="user-wiggles-display">0</span> &bull; Spins:<span
          id="user-spins-display"
          >0</span
        >
      </button>
      <button class="game-btn menu-item menu-label" disabled>
        Global Statistics
      </button>
      <button class="game-btn menu-item" disabled>
        Best: <span id="global-high-score-display">0.0</span> &bull; Total:
        <span id="global-total-score-display">0.0</span>
      </button>
      <button class="game-btn menu-item" disabled>
        Wiggles: <span id="global-wiggles-display">0</span> &bull; Spins:
        <span id="global-spins-display">0</span>
      </button>
      <a href="leaderboard.html" class="game-btn menu-item">
        View Leaderboard
      </a>
      <button class="game-btn menu-item menu-label" disabled>Credits</button>
      <a
        href="https://bsky.app/profile/yuriclown.bsky.social"
        target="_blank"
        class="game-btn menu-item"
      >
        Image by Spitzy
      </a>

      <a
        href="https://www.youtube.com/watch?v=1Gw1nTsE7Gg"
        target="_blank"
        class="game-btn menu-item"
      >
        Audio by Surya Hearts
      </a>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()"></div>

    <script src="assets/scripts/script.js"></script>
  </body>
</html>
